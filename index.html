<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 创作工作台</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <style>
    :root{--orange:#f97316;--orange-dark:#ea580c;--purple:#a855f7;--purple-dark:#9333ea;--sky:#0ea5e9;--sky-dark:#0284c7;--green:#22c55e;--pink:#ec4899;}
    *{box-sizing:border-box;}
    body{background:#050508;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;}
    .glass{background:rgba(255,255,255,0.025);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.07);}
    .glass-hover:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);}
    .btn{transition:all .18s;cursor:pointer;border:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:500;}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
    .btn-ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;}
    .btn-ghost:hover:not(:disabled){background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.18);}
    .btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;}
    .btn-orange:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(249,115,22,.4);}
    .btn-sky{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;}
    .btn-sky:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(14,165,233,.4);}
    .btn-purple{background:linear-gradient(135deg,#a855f7,#9333ea);color:#fff;}
    .btn-purple:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(168,85,247,.4);}
    .btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
    .btn-green:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(34,197,94,.4);}
    .btn-pink{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff;}
    .btn-pink:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(236,72,153,.4);}
    .btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;}
    textarea,input[type=text],input[type=password],input[type=number],select{
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);
      color:#e2e8f0;width:100%;border-radius:10px;padding:9px 12px;font-size:13px;transition:border-color .15s,box-shadow .15s;
    }
    textarea:focus,input:focus,select:focus{outline:none;border-color:rgba(249,115,22,.5);box-shadow:0 0 0 3px rgba(249,115,22,.1);}
    textarea{resize:none;}
    select option{background:#1a1a2e;color:#e2e8f0;}
    .page-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s;cursor:pointer;border:none;color:#9ca3af;}
    .page-tab:hover{color:#e2e8f0;background:rgba(255,255,255,.05);}
    .page-tab.active{color:#fff;}
    .page-tab.active.orange{background:linear-gradient(135deg,#f97316,#ea580c);}
    .page-tab.active.purple{background:linear-gradient(135deg,#a855f7,#9333ea);}
    .page-tab.active.green{background:linear-gradient(135deg,#22c55e,#16a34a);}
    .func-tab{flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:500;transition:all .15s;cursor:pointer;border:none;background:transparent;color:#6b7280;text-align:center;}
    .func-tab:hover{color:#e2e8f0;background:rgba(255,255,255,.05);}
    .func-tab.active{background:rgba(255,255,255,.08);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);}
    .upload-zone{border:2px dashed rgba(255,255,255,.12);border-radius:14px;transition:all .2s;cursor:pointer;text-align:center;padding:20px 12px;}
    .upload-zone:hover,.upload-zone.drag{border-color:#f97316;background:rgba(249,115,22,.06);}
    .upload-zone img,.upload-zone video,.upload-zone audio{max-height:120px;max-width:100%;border-radius:8px;margin:0 auto;}
    .badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;}
    .progress-bar{height:3px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:999px;transition:width .5s ease;background:linear-gradient(90deg,#f97316,#ea580c);}
    .progress-fill.purple{background:linear-gradient(90deg,#a855f7,#9333ea);}
    .spin{animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .fade-in{animation:fadeIn .35s ease;}
    @keyframes fadeIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;border-radius:12px;font-size:13px;animation:slideIn .25s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2);}
    .ref-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px 10px;}
    .img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
    .img-cell{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;cursor:pointer;}
    .img-cell img{width:100%;height:100%;object-fit:cover;}
    .img-cell .remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border-radius:999px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#fff;}
    .video-result{border-radius:16px;overflow:hidden;background:#000;}
    .video-result video{width:100%;display:block;}
    .hist-card{display:flex;gap:8px;padding:8px;border-radius:10px;cursor:pointer;transition:background .15s;}
    .hist-card:hover{background:rgba(255,255,255,.04);}
    .hist-thumb{width:52px;height:52px;object-fit:cover;border-radius:7px;flex-shrink:0;}
    .step{display:flex;align-items:center;gap:6px;padding:6px 0;font-size:12px;}
    .step-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    /* 视频模型卡片 */
    .model-card{border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;border:2px solid transparent;}
    .model-card:hover{background:rgba(255,255,255,.04);}
    .model-card.selected{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.08);}
    .model-card.selected-orange{border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.08);}
    .model-card.selected-sky{border-color:rgba(14,165,233,.5);background:rgba(14,165,233,.08);}
    .model-card.selected-green{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.08);}
    .model-card.selected-pink{border-color:rgba(236,72,153,.5);background:rgba(236,72,153,.08);}
    .model-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;}
    /* 图片分割 */
    .split-grid{display:grid;gap:2px;border-radius:10px;overflow:hidden;}
    .split-cell{background:#111;overflow:hidden;position:relative;}
    .split-cell img{width:100%;height:100%;object-fit:cover;display:block;}
    /* slide transition */
    .slide-enter-active,.slide-leave-active{transition:all .25s ease;}
    .slide-enter-from,.slide-leave-to{opacity:0;transform:translateY(-8px);}
  </style>
</head>
<body>
<div id="app">

  <!-- ━━ 顶栏 ━━ -->
  <header class="glass sticky top-0 z-50" style="border-bottom:1px solid rgba(255,255,255,.06);">
    <div style="max-width:1360px;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#f97316,#9333ea);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;">AI</div>
        <div>
          <div style="font-weight:600;font-size:14px;line-height:1.2;">创作工作台</div>
          <div style="font-size:10px;color:#6b7280;">图像 · 视频 · 工具</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div style="display:flex;gap:3px;background:rgba(255,255,255,.04);padding:4px;border-radius:10px;">
          <button class="page-tab orange" :class="{active:page==='image'}" @click="page='image'">🖼 图像生成</button>
          <button class="page-tab purple" :class="{active:page==='video'}" @click="page='video'">🎬 视频生成</button>
          <button class="page-tab green" :class="{active:page==='split'}" @click="page='split'">✂️ 图片分割</button>
        </div>
        <button class="btn btn-ghost" style="padding:6px 12px;border-radius:8px;font-size:12px;" @click="showCfg=!showCfg">
          ⚙️ API 配置
        </button>
      </div>
    </div>
  </header>

  <!-- ━━ API 配置抽屉 ━━ -->
  <transition name="slide">
    <div v-if="showCfg" style="max-width:1360px;margin:0 auto;padding:16px 20px 0;">
      <div class="glass" style="border-radius:18px;padding:20px 24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <span style="font-weight:600;font-size:15px;">API 密钥配置</span>
          <button class="btn btn-ghost" style="padding:4px 10px;border-radius:7px;font-size:12px;" @click="showCfg=false">关闭</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;">
          <!-- 阿里云（通义 + 可灵） -->
          <div style="background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.18);border-radius:14px;padding:14px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
              <div style="width:7px;height:7px;border-radius:50%;background:#f97316;box-shadow:0 0 5px #f97316;"></div>
              <span style="font-size:13px;font-weight:600;">阿里云</span>
            </div>
            <p style="font-size:11px;color:#9ca3af;margin-bottom:8px;">Qwen-Image 2.0（图像）· 可灵 Kling（视频）</p>
            <input type="password" v-model="cfg.alibaba" placeholder="DashScope API Key" @input="saveCfg">
          </div>
          <!-- 腾讯云（混元图像） -->
          <div style="background:rgba(14,165,233,.07);border:1px solid rgba(14,165,233,.18);border-radius:14px;padding:14px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
              <div style="width:7px;height:7px;border-radius:50%;background:#0ea5e9;box-shadow:0 0 5px #0ea5e9;"></div>
              <span style="font-size:13px;font-weight:600;">腾讯云</span>
            </div>
            <p style="font-size:11px;color:#9ca3af;margin-bottom:8px;">混元生图（图像）</p>
            <input type="password" v-model="cfg.txId" placeholder="SecretId" @input="saveCfg" style="margin-bottom:8px;">
            <input type="password" v-model="cfg.txKey" placeholder="SecretKey" @input="saveCfg">
          </div>
          <!-- 火山引擎（即梦图像 + Seedance 视频） -->
          <div style="background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.18);border-radius:14px;padding:14px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
              <div style="width:7px;height:7px;border-radius:50%;background:#a855f7;box-shadow:0 0 5px #a855f7;"></div>
              <span style="font-size:13px;font-weight:600;">火山引擎</span>
            </div>
            <p style="font-size:11px;color:#9ca3af;margin-bottom:8px;">即梦图像 · Seedance 2.0 视频</p>
            <input type="password" v-model="cfg.volc" placeholder="API Key (Bearer Token)" @input="saveCfg">
          </div>
          <!-- MiniMax（海螺视频） -->
          <div style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);border-radius:14px;padding:14px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
              <div style="width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e;"></div>
              <span style="font-size:13px;font-weight:600;">MiniMax</span>
            </div>
            <p style="font-size:11px;color:#9ca3af;margin-bottom:8px;">海螺 Hailuo 视频生成</p>
            <input type="password" v-model="cfg.minimax" placeholder="MiniMax API Key" @input="saveCfg">
          </div>
        </div>
        <p style="margin-top:10px;font-size:11px;color:#4b5563;text-align:center;">密钥仅保存在本地浏览器，不会上传任何服务器</p>
      </div>
    </div>
  </transition>

  <!-- ━━ 主体 ━━ -->
  <main style="max-width:1360px;margin:0 auto;padding:20px;display:flex;gap:20px;align-items:flex-start;">

    <!-- ════ 图像生成面板 ════ -->
    <template v-if="page==='image'">
      <!-- 左侧控制 -->
      <div style="width:400px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;">
        <div style="display:flex;gap:4px;background:rgba(255,255,255,.04);padding:5px;border-radius:13px;">
          <button v-for="t in imgTabs" :key="t.id" class="func-tab" :class="{active:imgTab===t.id}" @click="imgTab=t.id">{{t.label}}</button>
        </div>
        <div class="glass" style="border-radius:18px;padding:18px 20px;display:flex;flex-direction:column;gap:14px;">
          <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <label style="font-size:12px;color:#9ca3af;">提示词</label>
              <button @click="optimizePrompt" :disabled="optimizing||!imgForm.prompt" style="font-size:11px;color:#f97316;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;">
                <div v-if="optimizing" class="spin" style="width:11px;height:11px;border:2px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:50%;"></div>
                <span v-else>⚡</span> AI优化
              </button>
            </div>
            <textarea v-model="imgForm.prompt" rows="3" placeholder="描述你想要的图像内容…"></textarea>
          </div>
          <div>
            <label style="font-size:12px;color:#9ca3af;display:block;margin-bottom:6px;">反向提示词（可选）</label>
            <textarea v-model="imgForm.negPrompt" rows="2" placeholder="不想要的内容，如：模糊、低质量…"></textarea>
          </div>
          <div v-if="imgTab!=='txt2img'">
            <label style="font-size:12px;color:#9ca3af;display:block;margin-bottom:6px;">{{ imgTab==='img2img'?'参考图':'原图（待编辑）' }}</label>
            <div class="upload-zone" :class="{drag:imgDrag}" @click="$refs.imgRefIn.click()" @dragover.prevent="imgDrag=true" @dragleave="imgDrag=false" @drop.prevent="dropFile($event,'imgRef')">
              <input ref="imgRefIn" type="file" accept="image/*" style="display:none;" @change="pickFile($event,'imgRef')">
              <div v-if="!imgRefSrc" style="color:#4b5563;"><svg style="width:28px;height:28px;margin:0 auto 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><p style="font-size:12px;">点击或拖拽上传</p></div>
              <div v-else style="position:relative;display:inline-block;"><img :src="imgRefSrc" style="max-height:100px;border-radius:8px;"><button @click.stop="imgRefSrc='';imgRefData=''" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:rgba(239,68,68,.9);border-radius:50%;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;">×</button></div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div><label style="font-size:12px;color:#9ca3af;display:block;margin-bottom:5px;">尺寸</label>
              <select v-model="imgForm.size"><option value="1024x1024">1:1 (1024×1024)</option><option value="1280x720">16:9 (1280×720)</option><option value="720x1280">9:16 (720×1280)</option><option value="1152x896">4:3 (1152×896)</option><option value="896x1152">3:4 (896×1152)</option></select></div>
            <div><label style="font-size:12px;color:#9ca3af;display:block;margin-bottom:5px;">数量</label>
              <select v-model="imgForm.n"><option value="1">1 张</option><option value="2">2 张</option><option value="4">4 张</option></select></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn btn-orange" style="width:100%;padding:13px;border-radius:13px;font-size:14px;" :disabled="genImg.ali||!cfg.alibaba" @click="generateImage('ali')">
            <div v-if="genImg.ali" class="spin" style="width:17px;height:17px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;"></div>
            <span>{{ genImg.ali?'生成中...':'⚡ 阿里云 · 通义千问' }}</span>
          </button>
          <button class="btn btn-sky" style="width:100%;padding:13px;border-radius:13px;font-size:14px;" :disabled="genImg.tx||!cfg.txId||!cfg.txKey" @click="generateImage('tx')">
            <div v-if="genImg.tx" class="spin" style="width:17px;height:17px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;"></div>
            <span>{{ genImg.tx?txStatus:'🌊 腾讯云 · 混元生图' }}</span>
          </button>
          <button class="btn btn-purple" style="width:100%;padding:13px;border-radius:13px;font-size:14px;" :disabled="genImg.volc||!cfg.volc" @click="generateImage('volc')">
            <div v-if="genImg.volc" class="spin" style="width:17px;height:17px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;"></div>
            <span>{{ genImg.volc?'生成中...':'🔥 火山引擎 · 即梦图像' }}</span>
          </button>
        </div>
        <!-- 历史记录 -->
        <div class="glass" style="border-radius:18px;padding:16px 18px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <span style="font-size:13px;font-weight:600;">历史记录</span>
            <button v-if="history.length>0" @click="history=[];saveHistory()" style="font-size:11px;color:#4b5563;background:none;border:none;cursor:pointer;">清空</button>
          </div>
          <div v-if="history.length===0" style="text-align:center;padding:16px 0;color:#374151;font-size:12px;">暂无记录</div>
          <div style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;">
            <div v-for="item in history" :key="item.id" class="hist-card" @click="reloadHistory(item)">
              <img :src="item.thumb" class="hist-thumb" onerror="this.style.display='none'">
              <div style="flex:1;min-width:0;">
                <p style="font-size:11px;color:#d1d5db;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{item.prompt}}</p>
                <div style="display:flex;align-items:center;gap:5px;margin-top:3px;">
                  <span class="badge" style="background:rgba(168,85,247,.15);color:#a855f7;" v-if="item.type==='video'">视频</span>
                  <span class="badge" style="background:rgba(249,115,22,.15);color:#f97316;" v-else>图像</span>
                  <span style="font-size:10px;color:#374151;">{{item.time}}</span>
                </div>
              </div>
              <button @click.stop="removeHistory(item.id)" style="color:#374151;background:none;border:none;cursor:pointer;font-size:14px;padding:0 2px;line-height:1;">×</button>
            </div>
          </div>
        </div>
      </div>
      <!-- 右侧结果 -->
      <div style="flex:1;min-width:0;">
        <div class="glass" style="border-radius:20px;padding:20px;min-height:520px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <span style="font-size:14px;font-weight:600;">生成结果</span>
            <div style="display:flex;gap:8px;" v-if="results.length>0">
              <button class="btn btn-ghost" style="padding:6px 12px;border-radius:8px;font-size:12px;" @click="downloadAll">⬇️ 全部下载</button>
              <button @click="results=[]" style="color:#4b5563;background:none;border:none;cursor:pointer;font-size:18px;padding:0 4px;line-height:1;">×</button>
            </div>
          </div>
          <div v-if="results.length===0&&!Object.values(genImg).some(v=>v)" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:#374151;">
            <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(168,85,247,.15));display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:32px;">🖼</div>

            <p style="font-size:12px;margin-top:5px;color:#4b5563;">填写提示词后点击生成按钮</p>

          <div v-if="genVid&&results.length===0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;">
            <div class="spin" style="width:48px;height:48px;border:3px solid rgba(168,85,247,.2);border-top-color:#a855f7;border-radius:50%;margin-bottom:16px;"></div>
            <p style="font-size:14px;font-weight:500;">{{vidStatus}}</p>
            <p style="font-size:12px;color:#4b5563;margin-top:6px;">视频生成通常需要 30~120 秒，请耐心等待</p>
          </div>
          <div v-if="results.length>0&&results[0].type==='video'">
            <div v-for="(r,i) in results" :key="i" class="video-result fade-in">
              <video :src="r.url" controls loop style="max-height:500px;width:100%;"></video>
              <div style="padding:10px 12px;background:rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-ghost" style="padding:7px 14px;border-radius:8px;font-size:12px;" @click="downloadItem(r,i)">⬇ 下载视频</button>
                <span class="badge" style="background:rgba(168,85,247,.2);color:#c084fc;">{{r.api}}</span>
                <span style="font-size:11px;color:#4b5563;">{{r.duration}}s · {{r.resolution}}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ════ 图片分割工具 ════ -->
    <template v-if="page==='split'">
      <div style="width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;">
        <div class="glass" style="border-radius:18px;padding:18px 20px;">
          <div style="font-size:14px;font-weight:600;margin-bottom:4px;">图片分割工具</div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:16px;">将图片均等切割为 N×N 的多张小图，适合九宫格发布</div>

          <!-- 上传区 -->
          <div class="upload-zone" :class="{drag:splitDrag}" @click="$refs.splitIn.click()" @dragover.prevent="splitDrag=true" @dragleave="splitDrag=false" @drop.prevent="dropSplit($event)" style="margin-bottom:14px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <input ref="splitIn" type="file" accept="image/*" style="display:none;" @change="pickSplit($event)">
            <div v-if="!splitSrc" style="color:#4b5563;">
              <svg style="width:32px;height:32px;margin:0 auto 8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <p style="font-size:13px;font-weight:500;">点击或拖拽上传图片</p>
              <p style="font-size:11px;margin-top:4px;">支持 JPG / PNG / WebP</p>
            </div>
            <div v-else style="width:100%;">
              <img :src="splitSrc" style="max-height:150px;max-width:100%;border-radius:8px;margin:0 auto;display:block;">
              <div style="text-align:center;margin-top:8px;">
                <span style="font-size:11px;color:#9ca3af;">{{ splitInfo }}</span>
                <button @click.stop="splitSrc='';splitCells=[];splitInfo=''" style="font-size:10px;color:#ef4444;background:none;border:none;cursor:pointer;margin-left:8px;">重新选择</button>
              </div>
            </div>
          </div>

          <!-- 分割参数 -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
            <div>
              <label style="font-size:12px;color:#9ca3af;display:block;margin-bottom:6px;">分割方式</label>
              <select v-model="splitN">
                <option value="3">3×3（九宫格）</option>
                <option value="4">4×4（十六格）</option>
                <option value="5">5×5（二十五格）</option>
              </select>
            </div>
            <div>
              <label style="font-size:12px;color:#9ca3af;display:block;margin-bottom:6px;">输出尺寸</label>
              <select v-model="splitOutputSize">
                <option value="0">保持原始大小</option>
                <option value="1080">每格 1080px</option>
                <option value="800">每格 800px</option>
                <option value="640">每格 640px</option>
              </select>
            </div>
          </div>

          <!-- 排列说明 -->
          <div style="background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.1);border-radius:10px;padding:10px 12px;margin-bottom:14px;">
            <p style="font-size:11px;color:#4b5563;">📐 编号规则：从左上角开始，从左到右、从上到下依次编号</p>
            <p style="font-size:11px;color:#4b5563;margin-top:4px;">💡 发小红书/微博时按编号顺序上传可自动拼接为完整图</p>
          </div>

          <button class="btn btn-green" style="width:100%;padding:12px;border-radius:13px;font-size:14px;" :disabled="!splitSrc||splitting" @click="doSplit">
            <div v-if="splitting" class="spin" style="width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;"></div>
            <span>{{ splitting?'切割中...':'✂️ 开始切割' }}</span>
          </button>

          <!-- 下载全部 -->
          <button v-if="splitCells.length>0" class="btn btn-ghost" style="width:100%;padding:10px;border-radius:12px;font-size:13px;margin-top:8px;" @click="downloadSplitAll">
            ⬇️ 全部下载（{{ splitCells.length }} 张）
          </button>
        </div>

        <!-- 格子编号说明 -->
        <div v-if="splitCells.length>0" class="glass" style="border-radius:14px;padding:14px;">
          <div style="font-size:12px;color:#9ca3af;margin-bottom:8px;">发布顺序示意（{{splitN}}×{{splitN}}）</div>
          <div :style="`display:grid;grid-template-columns:repeat(${splitN},1fr);gap:3px;`">
            <div v-for="n in parseInt(splitN)*parseInt(splitN)" :key="n" style="aspect-ratio:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#6b7280;font-weight:600;">{{n}}</div>
          </div>
        </div>
      </div>

      <!-- 右侧分割结果 -->
      <div style="flex:1;min-width:0;">
        <div class="glass" style="border-radius:20px;padding:20px;min-height:520px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div>
              <span style="font-size:14px;font-weight:600;">切割结果</span>
              <span v-if="splitCells.length>0" style="font-size:12px;color:#9ca3af;margin-left:8px;">共 {{ splitCells.length }} 张</span>
            </div>
            <button v-if="splitCells.length>0" class="btn btn-ghost" style="padding:6px 12px;border-radius:8px;font-size:12px;" @click="downloadSplitAll">⬇ 批量下载</button>
          </div>

          <div v-if="splitCells.length===0" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:#374151;">
            <div style="font-size:56px;margin-bottom:14px;">✂️</div>
            <p style="font-size:14px;">上传图片并点击切割</p>
            <p style="font-size:12px;margin-top:5px;color:#4b5563;">支持 3×3 / 4×4 / 5×5 均等分割</p>
          </div>

          <!-- 结果预览网格 -->
          <div v-if="splitCells.length>0" :style="`display:grid;grid-template-columns:repeat(${splitN},1fr);gap:8px;`">
            <div v-for="(cell,idx) in splitCells" :key="idx" class="fade-in" style="border-radius:10px;overflow:hidden;background:#0a0a14;position:relative;cursor:pointer;" @click="downloadSplitOne(cell,idx)">
              <img :src="cell" style="width:100%;display:block;">
              <div style="position:absolute;top:5px;left:5px;background:rgba(0,0,0,.6);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600;">{{idx+1}}</div>
              <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);padding:5px;text-align:center;font-size:11px;color:#d1d5db;opacity:0;transition:.2s;" class="cell-hint">点击下载</div>
            </div>
          </div>
          <style>.split-cell:hover .cell-hint, div:hover > .cell-hint{opacity:1!important;}</style>
        </div>
      </div>
    </template>

  </main>

  <!-- Toast -->
  <div v-if="toast" class="toast glass" :style="`border-left:3px solid ${toastColor};`">{{ toast }}</div>
  <!-- 隐藏 canvas -->
  <canvas ref="cvs" style="display:none;"></canvas>
</div>

<script>
const {createApp,ref,reactive,onMounted} = Vue;
createApp({
  setup(){
    /* ── 全局 ── */
    const page = ref('image');
    const showCfg = ref(false);
    const toast = ref('');
    const toastColor = ref('#f97316');
    const results = ref([]);
    const history = ref([]);
    const cvs = ref(null);

    /* ── 配置 ── */
    const cfg = reactive({alibaba:'',txId:'',txKey:'',volc:'',minimax:''});

    /* ── 图像 ── */
    const imgTabs = [{id:'txt2img',label:'文生图'},{id:'img2img',label:'图生图'},{id:'inpaint',label:'局部重绘'}];
    const imgTab = ref('txt2img');
    const imgForm = reactive({prompt:'',negPrompt:'',size:'1024x1024',n:'1'});
    const imgRefSrc = ref(''); const imgRefData = ref('');
    const imgDrag = ref(false);
    const genImg = reactive({ali:false,tx:false,volc:false});
    const txStatus = ref('');
    const optimizing = ref(false);

    /* ── 视频 ── */
    const vidModel = ref('seedance');
    const vidTabs = [
      {id:'txt2vid',label:'文生视频'},
      {id:'img2vid',label:'图生视频'},
      {id:'audio2vid',label:'音频驱动'},
      {id:'vid2vid',label:'视频参考'},
      {id:'mix',label:'多模混合'},
    ];
    const vidTab = ref('txt2vid');
    const img2vidModes = [{id:'single',label:'单图'},{id:'keyframe',label:'首尾帧'},{id:'multi',label:'多图'}];
    const img2vidMode = ref('single');
    const vidForm = reactive({prompt:'',duration:'5',resolution:'720p',ratio:'16:9',weight:'1.0',klingMode:'std'});
    const vidRefs = reactive({img1:{src:'',data:''},first:{src:'',data:''},last:{src:'',data:''},multiImgs:[],audio:{src:'',data:''},refVid:{src:'',data:''}});
    const vDrag = reactive({img1:false,first:false,last:false,audio:false,refVid:false});
    const genVid = ref(false);
    const vidStatus = ref('');
    const vidProgress = ref(0);
    const vidSteps = ref([
      {id:1,text:'提交生成任务',done:false,active:false},
      {id:2,text:'模型处理中',done:false,active:false},
      {id:3,text:'视频合成完成',done:false,active:false},
    ]);

    /* ── 图片分割 ── */
    const splitSrc = ref('');
    const splitInfo = ref('');
    const splitN = ref('3');
    const splitOutputSize = ref('0');
    const splitDrag = ref(false);
    const splitting = ref(false);
    const splitCells = ref([]);

    /* ── 生命周期 ── */
    onMounted(()=>{
      const k=localStorage.getItem('ai-studio-cfg');
      if(k){const o=JSON.parse(k);Object.assign(cfg,o);}
      const h=localStorage.getItem('ai-studio-hist');
      if(h) history.value=JSON.parse(h);
    });

    /* ── 工具 ── */
    function showToast(msg,color='#f97316'){toast.value=msg;toastColor.value=color;setTimeout(()=>toast.value='',3500);}
    function saveCfg(){localStorage.setItem('ai-studio-cfg',JSON.stringify({alibaba:cfg.alibaba,txId:cfg.txId,txKey:cfg.txKey,volc:cfg.volc,minimax:cfg.minimax}));}
    function saveHistory(){localStorage.setItem('ai-studio-hist',JSON.stringify(history.value));}
    function addHistory(prompt,thumb,type,extra={}){
      history.value.unshift({id:Date.now(),prompt,thumb,type,...extra,time:new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})});
      if(history.value.length>60) history.value=history.value.slice(0,60);
      saveHistory();
    }
    function reloadHistory(item){if(item.type==='video'){page.value='video';vidForm.prompt=item.prompt;}else{page.value='image';imgForm.prompt=item.prompt;}}
    function removeHistory(id){history.value=history.value.filter(h=>h.id!==id);saveHistory();}

    function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});}
    function fileToUrl(file){return URL.createObjectURL(file);}

    async function pickFile(e,key){
      const files=Array.from(e.target.files);
      if(!files.length) return;
      if(key==='vMulti'){
        for(const f of files){
          if(vidRefs.multiImgs.length>=9) break;
          if(f.size>15*1024*1024){showToast('图片不能超过 15MB');continue;}
          const b64=await fileToB64(f);
          vidRefs.multiImgs.push({src:b64,data:b64});
        }
        return;
      }
      const file=files[0];
      if((key!=='vAudio'&&key!=='vRefVid')&&file.size>15*1024*1024){showToast('文件不能超过 15MB');return;}
      const b64=await fileToB64(file);
      const url=fileToUrl(file);
      if(key==='imgRef'){imgRefSrc.value=b64;imgRefData.value=b64;}
      else if(key==='vImg1'){vidRefs.img1.src=b64;vidRefs.img1.data=b64;}
      else if(key==='vFirst'){vidRefs.first.src=b64;vidRefs.first.data=b64;}
      else if(key==='vLast'){vidRefs.last.src=b64;vidRefs.last.data=b64;}
      else if(key==='vAudio'){vidRefs.audio.src=url;vidRefs.audio.data=b64;}
      else if(key==='vRefVid'){vidRefs.refVid.src=url;vidRefs.refVid.data=b64;}
      e.target.value='';
    }
    function dropFile(e,key){Object.keys(vDrag).forEach(k=>vDrag[k]=false);imgDrag.value=false;const f=e.dataTransfer.files[0];if(!f)return;pickFile({target:{files:[f],value:''}},key);}
    function clearVidRef(k){vidRefs[k]={src:'',data:''};}
    function removeMultiImg(idx){vidRefs.multiImgs.splice(idx,1);}

    async function optimizePrompt(){
      if(!imgForm.prompt.trim())return;
      optimizing.value=true;
      await new Promise(r=>setTimeout(r,600));
      const s=imgForm.prompt.trim();
      if(!s.includes('高清'))imgForm.prompt=s+', 高清精细, 专业摄影, 光影细腻, 细节丰富, 8K';
      optimizing.value=false;
      showToast('提示词已优化 ✓');
    }

    async function downloadItem(r,idx){
      try{
        const resp=await fetch(r.url);
        const blob=await resp.blob();
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`${r.type==='video'?'视频':'图像'}_${idx+1}_${Date.now()}.${r.type==='video'?'mp4':'png'}`;
        a.click();
      }catch{showToast('下载失败，请右键另存为');}
    }
    function downloadAll(){results.value.forEach((r,i)=>downloadItem(r,i));}

    /* ════ 图像生成 ════ */
    async function generateImage(api){
      if(!imgForm.prompt.trim()){showToast('请先填写提示词');return;}
      results.value=[];genImg[api]=true;
      try{
        if(api==='ali') await genAliImg();
        else if(api==='tx') await genTxImg();
        else await genVolcImg();
      }catch(e){showToast('生成失败：'+e.message,'#ef4444');}
      genImg[api]=false;
    }

    /* 阿里云 Qwen-Image */
    async function genAliImg(){
      const [w,h]=imgForm.size.split('x');
      const body={model:'qwen-image-2.0-pro',input:{messages:[{role:'user',content:[{text:imgForm.prompt}]}]},parameters:{size:`${w}*${h}`,negative_prompt:imgForm.negPrompt||undefined,prompt_extend:true,watermark:false,n:parseInt(imgForm.n)}};
      const r=await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.alibaba}`},body:JSON.stringify(body)});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
      const d=await r.json();
      const imgs=d.output?.choices?.[0]?.message?.content?.filter(c=>c.image)||[];
      if(!imgs.length) throw new Error('未返回图片');
      results.value=imgs.map(img=>({url:img.image,type:'image',prompt:imgForm.prompt}));
      addHistory(imgForm.prompt,imgs[0].image,'image');
      showToast(`成功生成 ${imgs.length} 张图片 ✓`);
    }

    /* 腾讯混元（TC3签名） */
    async function genTxImg(){
      const [w,h]=imgForm.size.split('x');
      const e=new TextEncoder();
      async function sha256(s){const b=await crypto.subtle.digest('SHA-256',e.encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
      async function hmac(k,m){const kRaw=typeof k==='string'?e.encode(k):k;const key=await crypto.subtle.importKey('raw',kRaw,{name:'HMAC',hash:'SHA-256'},false,['sign']);const sig=await crypto.subtle.sign('HMAC',key,e.encode(m));return new Uint8Array(sig);}
      async function hmacHex(k,m){return Array.from(await hmac(k,m)).map(x=>x.toString(16).padStart(2,'0')).join('');}
      const host='aiart.tencentcloudapi.com',svc='aiart',ver='2022-12-29',region='ap-beijing';
      const ts=Math.floor(Date.now()/1000);
      const date=new Date(ts*1000).toISOString().split('T')[0];
      const alg='TC3-HMAC-SHA256',scope=`${date}/${svc}/tc3_request`;
      const bodyStr=JSON.stringify({Prompt:imgForm.prompt,Resolution:`${w}:${h}`,Revise:1});
      const hPayload=await sha256(bodyStr);
      const canon=`POST\n/\n\ncontent-type:application/json\nhost:${host}\n\ncontent-type;host\n${hPayload}`;
      const sts=`${alg}\n${ts}\n${scope}\n${await sha256(canon)}`;
      const kDate=await hmac(`TC3${cfg.txKey}`,date);
      const kSvc=await hmac(kDate,svc);
      const kSign=await hmac(kSvc,'tc3_request');
      const sig=await hmacHex(kSign,sts);
      const auth=`${alg} Credential=${cfg.txId}/${scope}, SignedHeaders=content-type;host, Signature=${sig}`;
      txStatus.value='提交中...';
      const r=await fetch(`https://${host}`,{method:'POST',headers:{'Content-Type':'application/json','Host':host,'X-Action':'SubmitTextToImageJob','X-Version':ver,'X-Region':region,'X-Timestamp':ts.toString(),'Authorization':auth},body:bodyStr});
      if(!r.ok){const er=await r.json().catch(()=>({}));throw new Error(er.Response?.Error?.Message||`HTTP ${r.status}`);}
      const jd=await r.json();
      const jobId=jd.Response?.JobId;
      if(!jobId) throw new Error('未获取 JobId');
      for(let i=0;i<40;i++){
        await new Promise(r=>setTimeout(r,3000));
        txStatus.value=`轮询中 (${i+1}/40)`;
        const qBody=JSON.stringify({JobId:jobId});
        const qPH=await sha256(qBody);
        const qCanon=`POST\n/\n\ncontent-type:application/json\nhost:${host}\n\ncontent-type;host\n${qPH}`;
        const qSts=`${alg}\n${ts}\n${scope}\n${await sha256(qCanon)}`;
        const qSig=await hmacHex(kSign,qSts);
        const qAuth=`${alg} Credential=${cfg.txId}/${scope}, SignedHeaders=content-type;host, Signature=${qSig}`;
        const r2=await fetch(`https://${host}`,{method:'POST',headers:{'Content-Type':'application/json','Host':host,'X-Action':'QueryTextToImageJob','X-Version':ver,'X-Region':region,'X-Timestamp':ts.toString(),'Authorization':qAuth},body:qBody});
        const d2=await r2.json();
        const job=d2.Response;
        if(job?.Status===3){const url=job.ImageUrls?.[0]||job.ImageUrl;if(!url)throw new Error('任务成功但未返回图片URL');results.value=[{url,type:'image',prompt:imgForm.prompt}];addHistory(imgForm.prompt,url,'image');showToast('混元生图成功 ✓');return;}
        else if(job?.Status===4) throw new Error(job.ErrorMessage||'任务失败');
      }
      throw new Error('超时：未在 2 分钟内完成');
    }

    /* 火山引擎 即梦图像 */
    async function genVolcImg(){
      const [w,h]=imgForm.size.split('x');
      const body={model:'Doubao-Seedream-5.0-lite',prompt:imgForm.prompt,size:`${w}x${h}`,n:parseInt(imgForm.n),output_format:'png',response_format:'url',watermark:false};
      if(imgRefData.value&&imgTab.value!=='txt2img') body.image=imgRefData.value;
      const r=await fetch('https://ark.cn-beijing.volces.com/api/v3/images/generations',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.volc}`},body:JSON.stringify(body)});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
      const d=await r.json();
      const imgs=d.data||[];
      if(!imgs.length) throw new Error('未返回图片');
      results.value=imgs.map(img=>({url:img.url||('data:image/png;base64,'+img.b64_json),type:'image',prompt:imgForm.prompt}));
      addHistory(imgForm.prompt,imgs[0].url||results.value[0].url,'image');
      showToast(`成功生成 ${imgs.length} 张图片 ✓`);
    }

    /* ════ 视频生成 ════ */
    async function generateVideo(){
      if(!vidForm.prompt.trim()){showToast('请先填写提示词');return;}
      genVid.value=true;vidProgress.value=0;results.value=[];
      vidSteps.value.forEach(s=>{s.done=false;s.active=false;});
      try{
        if(vidModel.value==='seedance') await runSeedance();
        else if(vidModel.value==='kling') await runKling();
        else if(vidModel.value==='minimax') await runMinimax();
      }catch(e){showToast('视频生成失败：'+e.message,'#ef4444');}
      genVid.value=false;
    }

    /* Seedance 2.0 */
    async function runSeedance(){
      const refs=[];const w=parseFloat(vidForm.weight);
      if(vidTab.value==='img2vid'){
        if(img2vidMode.value==='single'&&vidRefs.img1.data) refs.push({type:'image',url:vidRefs.img1.data,weight:w});
        if(img2vidMode.value==='keyframe'){if(vidRefs.first.data)refs.push({type:'image',url:vidRefs.first.data,weight:w,role:'first_frame'});if(vidRefs.last.data)refs.push({type:'image',url:vidRefs.last.data,weight:w,role:'last_frame'});}
        if(img2vidMode.value==='multi') vidRefs.multiImgs.forEach(img=>refs.push({type:'image',url:img.data,weight:w}));
      }
      if(vidTab.value==='audio2vid'||vidTab.value==='mix'){if(vidRefs.audio.data)refs.push({type:'audio',url:vidRefs.audio.data,weight:w});}
      if(vidTab.value==='vid2vid'||vidTab.value==='mix'){if(vidRefs.refVid.data)refs.push({type:'video',url:vidRefs.refVid.data,weight:w});}
      if(vidTab.value==='mix'&&vidRefs.img1.data) refs.push({type:'image',url:vidRefs.img1.data,weight:w});
      const payload={model:'seedance-2.0',input:{prompt:vidForm.prompt,duration:parseInt(vidForm.duration),resolution:vidForm.resolution,aspect_ratio:vidForm.ratio,...(refs.length>0?{references:refs}:{})}};
      await runVolcVideoTask(payload,'Seedance 2.0');
    }

    async function runVolcVideoTask(payload,apiName){
      vidSteps.value[0].active=true;vidStatus.value='提交生成任务…';vidProgress.value=10;
      const endpoint='https://ark.cn-beijing.volces.com';
      const r=await fetch(`${endpoint}/api/v3/video/generations`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.volc}`},body:JSON.stringify(payload)});
      if(!r.ok){const e=await r.json().catch(()=>({}));const msg=e.error?.message||`HTTP ${r.status}`;if(r.status===404)throw new Error('API 端点不可用：'+msg);throw new Error(msg);}
      const jd=await r.json();
      const taskId=jd.id||jd.task_id;
      if(!taskId) throw new Error('未获取任务 ID');
      vidSteps.value[0].done=true;vidSteps.value[0].active=false;vidSteps.value[1].active=true;
      vidStatus.value='模型生成中…';vidProgress.value=20;
      let videoUrl='';
      for(let i=0;i<60;i++){
        await new Promise(res=>setTimeout(res,4000));
        vidProgress.value=Math.min(20+Math.round(i*1.2),85);
        vidStatus.value=`处理中 (${i+1}/60)…`;
        const qr=await fetch(`${endpoint}/api/v3/video/generations/${taskId}`,{headers:{'Authorization':`Bearer ${cfg.volc}`}});
        if(!qr.ok) continue;
        const qd=await qr.json();
        const status=qd.status;
        if(status==='completed'||status==='succeeded'||status==='succeed'){
          videoUrl=qd.output?.video_url||qd.result?.video_url||qd.video_url||qd.data?.[0]?.url;break;
        }
        if(status==='failed'||status==='error') throw new Error(qd.error?.message||'任务失败');
        const prog=qd.progress||qd.percent||0;
        if(prog>0) vidProgress.value=Math.max(vidProgress.value,20+Math.round(prog*0.65));
      }
      if(!videoUrl) throw new Error('超时：4 分钟未完成，请缩短时长后重试');
      finishVideo(videoUrl,apiName);
    }

    function finishVideo(url,apiName){
      vidSteps.value[1].done=true;vidSteps.value[1].active=false;vidSteps.value[2].active=true;
      vidProgress.value=100;vidStatus.value='视频合成完成 ✓';vidSteps.value[2].done=true;vidSteps.value[2].active=false;
      results.value=[{url,type:'video',prompt:vidForm.prompt,api:apiName,duration:vidForm.duration,resolution:vidForm.resolution}];
      addHistory(vidForm.prompt,'','video',{api:apiName,duration:vidForm.duration});
      showToast('视频生成成功 🎬','#a855f7');
    }

    /* 可灵 Kling（阿里百炼通道） */
    async function runKling(){
      vidSteps.value[0].active=true;vidStatus.value='提交可灵任务…';vidProgress.value=10;
      const input={prompt:vidForm.prompt};
      if(vidTab.value==='img2vid'){
        if(img2vidMode.value==='single'&&vidRefs.img1.data) input.media=[{type:'first_frame',url:vidRefs.img1.data}];
        if(img2vidMode.value==='keyframe'){
          const m=[];
          if(vidRefs.first.data) m.push({type:'first_frame',url:vidRefs.first.data});
          if(vidRefs.last.data) m.push({type:'last_frame',url:vidRefs.last.data});
          if(m.length) input.media=m;
        }
      }
      const body={
        model:'kling/kling-v3-video-generation',
        input,
        parameters:{mode:vidForm.klingMode,aspect_ratio:vidForm.ratio,duration:parseInt(vidForm.duration),audio:false,watermark:false}
      };
      const r=await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.alibaba}`,'X-DashScope-Async':'enable'},
        body:JSON.stringify(body)
      });
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||e.error?.message||`HTTP ${r.status}`);}
      const jd=await r.json();
      const taskId=jd.output?.task_id;
      if(!taskId) throw new Error('未获取 task_id：'+JSON.stringify(jd).slice(0,200));
      vidSteps.value[0].done=true;vidSteps.value[0].active=false;vidSteps.value[1].active=true;
      vidStatus.value='可灵处理中…';vidProgress.value=20;
      let videoUrl='';
      for(let i=0;i<50;i++){
        await new Promise(res=>setTimeout(res,5000));
        vidProgress.value=Math.min(25+Math.round(i*1.3),85);
        vidStatus.value=`可灵处理中 (${i+1}/50)…`;
        const qr=await fetch(`https://dashscope.aliyuncs.com/api/v1/tasks/${taskId}`,{headers:{'Authorization':`Bearer ${cfg.alibaba}`}});
        if(!qr.ok) continue;
        const qd=await qr.json();
        const status=qd.output?.task_status;
        if(status==='SUCCEEDED'){
          videoUrl=qd.output?.video_url||qd.output?.watermark_video_url;break;
        }
        if(status==='FAILED') throw new Error(qd.output?.message||'可灵任务失败');
      }
      if(!videoUrl) throw new Error('超时：5 分钟未完成');
      finishVideo(videoUrl,'Kling v3.0');
    }

    /* MiniMax 海螺 */
    async function runMinimax(){
      vidSteps.value[0].active=true;vidStatus.value='提交海螺任务…';vidProgress.value=10;
      const body={model:'MiniMax-Hailuo-2.3',prompt:vidForm.prompt,prompt_optimizer:true};
      if(vidTab.value==='img2vid'&&img2vidMode.value==='single'&&vidRefs.img1.data) body.first_frame_image=vidRefs.img1.data;
      if(vidTab.value==='img2vid'&&img2vidMode.value==='keyframe'){
        if(vidRefs.first.data) body.first_frame_image=vidRefs.first.data;
        if(vidRefs.last.data) body.last_frame_image=vidRefs.last.data;
      }
      const dMap={'5':5,'6':6,'8':10,'10':10};
      body.seconds=dMap[vidForm.duration]||6;
      const r=await fetch('https://api.minimaxi.chat/v1/video_generation',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.minimax}`},
        body:JSON.stringify(body)
      });
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||e.base_resp?.status_msg||`HTTP ${r.status}`);}
      const jd=await r.json();
      const taskId=jd.task_id||jd.id;
      if(!taskId) throw new Error('未获取 task_id：'+JSON.stringify(jd).slice(0,200));
      vidSteps.value[0].done=true;vidSteps.value[0].active=false;vidSteps.value[1].active=true;
      vidStatus.value='海螺处理中…';vidProgress.value=20;
      let videoUrl='';
      for(let i=0;i<50;i++){
        await new Promise(res=>setTimeout(res,5000));
        vidProgress.value=Math.min(22+Math.round(i*1.3),85);
        vidStatus.value=`海螺处理中 (${i+1}/50)…`;
        const qr=await fetch(`https://api.minimaxi.chat/v1/query/video_generation?task_id=${taskId}`,{headers:{'Authorization':`Bearer ${cfg.minimax}`}});
        if(!qr.ok) continue;
        const qd=await qr.json();
        const status=qd.status;
        if(status==='Success'||status==='completed'){
          const fid=qd.file_id||qd.output?.file_id||qd.data?.[0]?.file_id;
          if(fid){
            const fr=await fetch(`https://api.minimaxi.chat/v1/files/retrieve?file_id=${fid}`,{headers:{'Authorization':`Bearer ${cfg.minimax}`}});
            const fd=await fr.json();
            videoUrl=fd.file?.download_url||fd.download_url;
          }else{
            videoUrl=qd.video_url||qd.output?.video_url;
          }
          break;
        }
        if(status==='Fail'||status==='failed') throw new Error(qd.message||'任务失败');
      }
      if(!videoUrl) throw new Error('超时或未能获取视频链接');
      finishVideo(videoUrl,'海螺 2.3');
    }

    /* ════ 图片分割 ════ */
    async function pickSplit(e){
      const file=e.target.files[0];if(!file)return;
      if(file.size>50*1024*1024){showToast('图片不能超过 50MB');return;}
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.onerror=rej;r.readAsDataURL(file);});
      splitSrc.value=b64;
      splitCells.value=[];
      const img=new Image();
      img.onload=()=>{splitInfo.value=`原始尺寸：${img.width}×${img.height}px`;};
      img.src=b64;
      e.target.value='';
    }
    function dropSplit(e){splitDrag.value=false;const f=e.dataTransfer.files[0];if(!f)return;pickSplit({target:{files:[f],value:''}});}

    async function doSplit(){
      if(!splitSrc.value){showToast('请先上传图片');return;}
      splitting.value=true;splitCells.value=[];
      await new Promise(r=>setTimeout(r,50));
      try{
        const n=parseInt(splitN.value);
        const img=new Image();
        await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=splitSrc.value;});
        const W=img.width,H=img.height;
        const cellW=Math.floor(W/n),cellH=Math.floor(H/n);
        const outSz=parseInt(splitOutputSize.value);
        const cells=[];
        for(let row=0;row<n;row++){
          for(let col=0;col<n;col++){
            const canvas=document.createElement('canvas');
            const finalW=outSz>0?outSz:cellW;
            const finalH=outSz>0?Math.round(cellH*(outSz/cellW)):cellH;
            canvas.width=finalW;canvas.height=finalH;
            const ctx=canvas.getContext('2d');
            ctx.drawImage(img,col*cellW,row*cellH,cellW,cellH,0,0,finalW,finalH);
            cells.push(canvas.toDataURL('image/png',0.95));
          }
        }
        splitCells.value=cells;
        showToast(`切割完成：${n}×${n} = ${n*n} 张图片 ✓`,'#22c55e');
      }catch(err){showToast('切割失败：'+err.message,'#ef4444');}
      splitting.value=false;
    }

    function downloadSplitOne(dataUrl,idx){
      const a=document.createElement('a');
      a.href=dataUrl;
      a.download=`分割_${String(idx+1).padStart(2,'0')}_${splitN.value}x${splitN.value}.png`;
      a.click();
    }
    function downloadSplitAll(){
      if(!splitCells.value.length){showToast('请先切割图片');return;}
      splitCells.value.forEach((cell,i)=>{
        setTimeout(()=>downloadSplitOne(cell,i),i*80);
      });
      showToast(`正在下载 ${splitCells.value.length} 张图片…`,'#22c55e');
    }

    return{
      page,showCfg,cfg,saveCfg,toast,toastColor,results,history,
      imgTabs,imgTab,imgForm,imgRefSrc,imgRefData,imgDrag,genImg,txStatus,optimizing,optimizePrompt,generateImage,
      vidModel,vidTabs,vidTab,img2vidModes,img2vidMode,vidForm,vidRefs,vDrag,genVid,vidStatus,vidProgress,vidSteps,generateVideo,
      pickFile,dropFile,clearVidRef,removeMultiImg,
      downloadItem,downloadAll,reloadHistory,removeHistory,saveHistory,
      splitSrc,splitInfo,splitN,splitOutputSize,splitDrag,splitting,splitCells,
      pickSplit,dropSplit,doSplit,downloadSplitOne,downloadSplitAll,
      cvs,window
    };
  }
}).mount('#app');
</script>
</body>
